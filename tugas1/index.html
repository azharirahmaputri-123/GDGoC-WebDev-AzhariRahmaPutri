<!DOCTYPE html>
<!--GDGOC ITS registration form-->

<html>
    <head>
        <title>GDGoC ITS - Registration form</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <header class ="site-header">
            <h1>GDGoC ITS - Hands On</h1>
        </header>

        <main class="container">
            <section class="card">
                <h2>About the event</h2>
                <p>
                    Build a event registration form
                </p>
            </section>
            <section class="card">
                <h2>Topic coverred</h2>
                <ul>
                    <li>HTML: basic structure and semantic elements</li>
                    <li>CSS: selectors,layout,and,styling</li>
                    <li>JavaScript: DOM,Events, funsctions,and array</li>
                </ul>
            </section>

            <section class="card">
                <h2>Event Registration</h2>

                <form id="registration-form" class="form">
                    <div class="forms-group">
                        <label for="name">Full name</label>
                        <input id="name" name="name" type="text" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="level">Experience level</label>
                        <select id="level" name="level">
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>

                    <div calss="form-group form-group-inline">
                        <label for="join wa">
                            <input id="join-wa" name="join-wa" type="checkbox"/>Join Whatsapp group
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Register</button>

                    <p id="error-message" class="message error"></p>
                    <p id="success-message" class="message succes"></p>
                </form>
            </section>
            <section class="card">
                <h2>Registered Participants</h2>
                <ul id="participants-list" class="participants-list"></ul>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
